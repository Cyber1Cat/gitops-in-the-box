apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com'
    targetRevision: HEAD
    path: system/sealed-secrets
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
